workflows:
  waqfa-ios-ipa:
    name: Waqfa iOS IPA
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - waqfa_secrets
      flutter: 3.24.2
      xcode: 16.4
      cocoapods: default
    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - $HOME/Library/Caches/CocoaPods
    scripts:
      - name: Install dependencies
        script: flutter pub get
      - name: Analyze project
        script: flutter analyze
      - name: Run tests
        script: flutter test
      - name: Validate AI configuration
        script: |
          if [ -z "${GROQ_API_KEY:-}" ]; then
            echo "GROQ_API_KEY is missing. Add it as a protected Codemagic environment variable."
            exit 1
          fi
      - name: Build unsigned iOS app
        script: flutter build ios --release --no-codesign --dart-define=GROQ_API_KEY="$GROQ_API_KEY"
      - name: Package IPA
        script: |
          rm -rf build/ios/ipa
          mkdir -p build/ios/ipa/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa/Payload/Runner.app
          cd build/ios/ipa
          /usr/bin/zip -qry Waqfa-unsigned.ipa Payload
    artifacts:
      - build/ios/ipa/*.ipa
